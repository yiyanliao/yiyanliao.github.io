name: Pages

on:
  push:
    branches:
      - main # default branch
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC): refresh Google Scholar stats
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow committing the refreshed scholar.json
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
      - name: Refresh Google Scholar stats
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --quiet scholarly
          python .github/scripts/update_scholar.py
          if [[ -n "$(git status --porcelain source/_data/scholar.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add source/_data/scholar.json
            git commit -m "Update Google Scholar stats"
            git push
          else
            echo "No change in scholar.json."
          fi
      - name: Use Node.js 22.15.0
        uses: actions/setup-node@v4
        with:
          # Examples: 20, 18.19, >=16.20.2, lts/Iron, lts/Hydrogen, *, latest, current, node
          # Ref: https://github.com/actions/setup-node#supported-version-syntax
          node-version: "22.15.0"
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache
      - name: Install Dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4